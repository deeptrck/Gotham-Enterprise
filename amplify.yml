version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - cp .next/required-server-files.json .next/standalone/required-server-files.json
        - cp .next/required-server-files.json .next/standalone/.next/required-server-files.json
        - cp -r .next/static .next/standalone/.next/static
        - cp -r public .next/standalone/public
    postBuild:
      commands:
        - rm -rf .next/cache
  artifacts:
    baseDirectory: .next/standalone
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
