version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        - rm -rf .next/cache
  artifacts:
    baseDirectory: .next
    files:
      - server/**/*
      - static/**/*
      - standalone/**/*
      - BUILD_ID
      - build-manifest.json
      - prerender-manifest.json
      - routes-manifest.json
      - required-server-files.json
  cache:
    paths:
      - node_modules/**/*